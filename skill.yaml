name: stock-query
version: 2.0.2
author: asfamilybank
description: >
  查询全球主要市场股票实时行情：A 股、港股、美股，以及 ETF、场外基金、主要指数，支持批量查询和持仓市值计算。
  Use when: 用户提到"查股价""查净值""行情""最新价""持仓市值""实时价格""大盘""指数""港股""美股"等。
  NOT for: 加密货币、期货、期权、外汇。
emoji: "📈"
requires:
  bins: [curl, iconv, bc]
  os: [darwin, linux]
license: MIT
repository: https://github.com/asfamilybank/stock-query

permissions:
  - network
  - shell

config:
  portfolio_file:
    type: string
    required: false
    default: ""
    description: "可选：持仓文件路径（CSV/JSON），用于批量查询和计算市值。脚本不会自动读取；若配置，agent 可能按用户指令读取，请勿指向含敏感信息的文件。"

entryPoint:
  type: natural
  prompt: |
    你是一个全球股票行情查询助手。根据 SKILL.md 中的工作流程，
    识别用户提供的标的代码（包括 A 股、港股、美股、ETF、基金及指数），
    调用腾讯财经接口查询行情，A 股失败时回退新浪接口。
    所有腾讯和新浪接口的 curl 响应必须通过 iconv -f GBK -t UTF-8 转码。

triggers:
  keywords:
    - "查股价"
    - "查行情"
    - "查指数"
    - "大盘"
    - "上证指数"
    - "查净值"
    - "最新价"
    - "stock price"
    - "实时价格"
    - "持仓市值"
    - "基金估值"
    - "港股"
    - "美股"
    - "纳斯达克"
    - "道琼斯"
    - "恒生指数"
